<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560" role="img" aria-labelledby="title desc">
  <title id="title">ThoughtCodec Architecture</title>
  <desc id="desc">Architecture diagram showing user intent, decompression skills, execution artifacts, compression skills, and reusable methodology.</desc>
  <rect width="1180" height="560" rx="24" fill="#f8fafc"/>
  <text x="590" y="54" text-anchor="middle" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">ThoughtCodec Architecture</text>
  <g font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">
    <rect x="60" y="190" width="190" height="90" rx="18" fill="#dbeafe" stroke="#2563eb"/>
    <text x="155" y="226" text-anchor="middle" fill="#1e3a8a">Human Intent</text>
    <text x="155" y="254" text-anchor="middle" fill="#1e3a8a">人的抽象意图</text>
    <rect x="315" y="124" width="220" height="90" rx="18" fill="#cffafe" stroke="#0891b2"/>
    <text x="425" y="160" text-anchor="middle" fill="#155e75">Decompression</text>
    <text x="425" y="188" text-anchor="middle" fill="#155e75">解压 Skill</text>
    <rect x="315" y="274" width="220" height="90" rx="18" fill="#fef3c7" stroke="#d97706"/>
    <text x="425" y="310" text-anchor="middle" fill="#92400e">Compression</text>
    <text x="425" y="338" text-anchor="middle" fill="#92400e">压缩 Skill</text>
    <rect x="600" y="124" width="220" height="90" rx="18" fill="#dcfce7" stroke="#16a34a"/>
    <text x="710" y="160" text-anchor="middle" fill="#166534">Execution Artifacts</text>
    <text x="710" y="188" text-anchor="middle" fill="#166534">执行制品</text>
    <rect x="600" y="274" width="220" height="90" rx="18" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="710" y="310" text-anchor="middle" fill="#5b21b6">Feedback / Logs</text>
    <text x="710" y="338" text-anchor="middle" fill="#5b21b6">反馈与日志</text>
    <rect x="890" y="190" width="230" height="90" rx="18" fill="#fee2e2" stroke="#dc2626"/>
    <text x="1005" y="226" text-anchor="middle" fill="#991b1b">Reusable Methodology</text>
    <text x="1005" y="254" text-anchor="middle" fill="#991b1b">可复用方法论</text>
  </g>
  <g fill="none" stroke="#334155" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M250 235h55"/>
    <path d="M535 169h55"/>
    <path d="M710 214v50"/>
    <path d="M820 319h40c22 0 30-12 30-30v-24"/>
    <path d="M535 319h55"/>
    <path d="M890 235h-40c-22 0-30-12-30-30v-36"/>
  </g>
  <g fill="#334155">
    <path d="M305 235l-14-8v16z"/>
    <path d="M590 169l-14-8v16z"/>
    <path d="M710 264l-8-14h16z"/>
    <path d="M860 319l-14-8v16z"/>
    <path d="M590 319l-14-8v16z"/>
  </g>
  <text x="590" y="472" text-anchor="middle" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">Intent becomes execution. Experience becomes durable skill.</text>
  <text x="590" y="504" text-anchor="middle" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">意图转化为执行，经验沉淀为 Skill。</text>
</svg>

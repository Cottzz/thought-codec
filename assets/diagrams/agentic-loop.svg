<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">Agentic Loop</title>
  <desc id="desc">Five-state agentic loop with regression check and rollback.</desc>
  <rect width="1180" height="620" rx="24" fill="#f8fafc"/>
  <text x="590" y="58" text-anchor="middle" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">Agentic Loop 智能体闭环</text>
  <g font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">
    <rect x="490" y="104" width="200" height="74" rx="18" fill="#dbeafe" stroke="#2563eb"/>
    <text x="590" y="134" text-anchor="middle" fill="#1e3a8a">Task Ingestion</text>
    <text x="590" y="160" text-anchor="middle" fill="#1e3a8a">任务输入</text>
    <rect x="790" y="220" width="200" height="74" rx="18" fill="#cffafe" stroke="#0891b2"/>
    <text x="890" y="250" text-anchor="middle" fill="#155e75">Decompression</text>
    <text x="890" y="276" text-anchor="middle" fill="#155e75">解压</text>
    <rect x="680" y="420" width="200" height="74" rx="18" fill="#dcfce7" stroke="#16a34a"/>
    <text x="780" y="450" text-anchor="middle" fill="#166534">Execution</text>
    <text x="780" y="476" text-anchor="middle" fill="#166534">执行</text>
    <rect x="300" y="420" width="200" height="74" rx="18" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="400" y="450" text-anchor="middle" fill="#5b21b6">Telemetry</text>
    <text x="400" y="476" text-anchor="middle" fill="#5b21b6">结果采集</text>
    <rect x="190" y="220" width="200" height="74" rx="18" fill="#fef3c7" stroke="#d97706"/>
    <text x="290" y="250" text-anchor="middle" fill="#92400e">Compression Gate</text>
    <text x="290" y="276" text-anchor="middle" fill="#92400e">压缩门</text>
  </g>
  <g fill="none" stroke="#334155" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M683 158c73 21 136 66 175 124"/>
    <path d="M879 295c0 47-23 91-62 124"/>
    <path d="M678 458H502"/>
    <path d="M363 419c-39-33-62-77-62-124"/>
    <path d="M322 221c39-58 102-103 175-124"/>
  </g>
  <g fill="#334155">
    <path d="M858 282l-3-20 18 10z"/>
    <path d="M817 419l19-6-7 18z"/>
    <path d="M502 458l16-10v20z"/>
    <path d="M301 295l10 16h-20z"/>
    <path d="M497 97l-20 2 12-16z"/>
  </g>
  <rect x="450" y="270" width="280" height="82" rx="20" fill="#fee2e2" stroke="#dc2626"/>
  <text x="590" y="304" text-anchor="middle" fill="#991b1b" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Regression Check</text>
  <text x="590" y="331" text-anchor="middle" fill="#991b1b" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">回归检查与回滚</text>
  <text x="590" y="556" text-anchor="middle" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">Corrections become draft patches before they become durable rules.</text>
</svg>

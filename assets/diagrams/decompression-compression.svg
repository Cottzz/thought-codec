<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" role="img" aria-labelledby="title desc">
  <title id="title">Decompression And Compression</title>
  <desc id="desc">Diagram showing how ThoughtCodec expands intent into execution and compresses experience into reusable skill rules.</desc>
  <rect width="1180" height="520" rx="24" fill="#f8fafc"/>
  <text x="590" y="58" text-anchor="middle" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">Decompression And Compression</text>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="90" y="124" width="1000" height="130" rx="24" fill="#e0f2fe" stroke="#0891b2" stroke-width="2"/>
    <text x="140" y="168" fill="#155e75" font-size="24" font-weight="800">Decompression 解压</text>
    <text x="140" y="203" fill="#164e63" font-size="18">Abstract intent becomes SOPs, architecture, code scaffolds,</text>
    <text x="140" y="228" fill="#164e63" font-size="18">checklists, and validation steps.</text>

    <rect x="90" y="292" width="1000" height="130" rx="24" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="140" y="336" fill="#92400e" font-size="24" font-weight="800">Compression 压缩</text>
    <text x="140" y="371" fill="#78350f" font-size="18">Corrections, logs, and repeated decisions become reusable</text>
    <text x="140" y="396" fill="#78350f" font-size="18">rules, skills, and implementation patches.</text>
  </g>

  <g fill="none" stroke="#334155" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M730 190h130"/>
    <path d="M860 190l-24-18M860 190l-24 18"/>
    <path d="M730 358h130"/>
    <path d="M860 358l-24-18M860 358l-24 18"/>
  </g>

  <g font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">
    <rect x="880" y="151" width="160" height="78" rx="18" fill="#fff" stroke="#0891b2"/>
    <text x="960" y="183" text-anchor="middle" fill="#155e75">Execution</text>
    <text x="960" y="210" text-anchor="middle" fill="#155e75">执行</text>

    <rect x="880" y="319" width="160" height="78" rx="18" fill="#fff" stroke="#d97706"/>
    <text x="960" y="351" text-anchor="middle" fill="#92400e">Skill Rule</text>
    <text x="960" y="378" text-anchor="middle" fill="#92400e">技能规则</text>
  </g>

  <text x="590" y="470" text-anchor="middle" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">Expand intent into execution, then compress experience into durable skills.</text>
</svg>

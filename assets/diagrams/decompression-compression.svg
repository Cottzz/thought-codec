<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" role="img" aria-labelledby="title desc">
  <title id="title">Decompression And Compression</title>
  <desc id="desc">Diagram showing top-down decompression and bottom-up compression.</desc>
  <rect width="1180" height="520" rx="24" fill="#f8fafc"/>
  <text x="590" y="58" text-anchor="middle" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">Decompression And Compression</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="90" y="130" width="1000" height="112" rx="24" fill="#e0f2fe" stroke="#0891b2" stroke-width="2"/>
    <text x="150" y="176" fill="#155e75" font-size="24" font-weight="800">Decompression 解压</text>
    <text x="150" y="211" fill="#164e63" font-size="19">Abstract intent -> SOP, architecture, code scaffold, checklist, and validation.</text>
    <rect x="90" y="288" width="1000" height="112" rx="24" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="150" y="334" fill="#92400e" font-size="24" font-weight="800">Compression 压缩</text>
    <text x="150" y="369" fill="#78350f" font-size="19">Corrections, logs, and repeated decisions -> reusable rules, skills, and patches.</text>
  </g>
  <g fill="none" stroke="#334155" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M840 186h120"/>
    <path d="M960 186l-28-22M960 186l-28 22"/>
    <path d="M340 344H220"/>
    <path d="M220 344l28-22M220 344l28 22"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">
    <rect x="900" y="141" width="160" height="90" rx="18" fill="#fff" stroke="#0891b2"/>
    <text x="980" y="178" text-anchor="middle" fill="#155e75">Execution</text>
    <text x="980" y="205" text-anchor="middle" fill="#155e75">执行</text>
    <rect x="120" y="299" width="160" height="90" rx="18" fill="#fff" stroke="#d97706"/>
    <text x="200" y="336" text-anchor="middle" fill="#92400e">Skill Rule</text>
    <text x="200" y="363" text-anchor="middle" fill="#92400e">技能规则</text>
  </g>

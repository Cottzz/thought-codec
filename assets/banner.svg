<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">ThoughtCodec Banner</title>
  <desc id="desc">Flat engineering-style banner for ThoughtCodec with a negative-space codec aperture mark.</desc>
  <rect width="1280" height="420" fill="#0f172a"/>
  <g transform="translate(82 78)">
